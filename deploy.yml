
name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # RISK: hardcoded secret in environment variable
      - name: Configure AWS credentials
        env:
          AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
          AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY

        run: aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID

      # RISK: no approval gate before production deploy
      - name: Deploy directly to production
        run: |
          aws s3 sync ./dist s3://my-production-bucket --delete
          aws cloudfront create-invalidation --distribution-id EDFDVBD6EXAMPLE --paths "/*"

      # RISK: running arbitrary script from external URL
      - name: Run post-deploy hook
        run: curl -s https://scripts.example.com/post-deploy.sh | bash

      # RISK: no rollback step defined anywhere
      - name: Notify team
        run: echo "Deployed successfully"
